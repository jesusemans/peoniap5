<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> peonía en p5.js </title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas { display: block; }
    #loader {
      position: fixed; inset: 0; z-index: 999;
      background: #000; display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      transition: opacity 0.8s ease;
    }
    #loader.fade { opacity: 0; pointer-events: none; }
    #loader .title { color: #fff; font-family: 'Courier New', monospace; font-size: 14px; letter-spacing: 4px; opacity: 0.7; margin-bottom: 24px; }
    #loader .bar-bg { width: 180px; height: 3px; background: #222; border-radius: 2px; overflow: hidden; }
    #loader .bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #c77, #e9b); transition: width 0.15s; }
    #loader .pct { color: #555; font-family: 'Courier New', monospace; font-size: 11px; margin-top: 10px; }
  </style>
</head>
<body>
<div id="loader">
  <div class="title">LOADING</div>
  <div class="bar-bg"><div class="bar-fill" id="loader-bar"></div></div>
  <div class="pct" id="loader-pct">0%</div>
</div>
<script>

const BUF_W = 680, BUF_H = 680;
let buf;
let chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*'.split('');
let ctx;

let elements = [];
let curEl = 0;

let phase = 'growing';
let phaseT = 0;

let bloom = 0;
let bloomTarget = 1;
let lastBloom = -1;

let renderMode = 0, prevMode = 0, modeT = 1;

let grid = 4, gridTarget = 4;
const GRID_MIN = 4, GRID_MAX = 20;
let densDir = 1, densTimer = 0;

let mInfX = 0, mInfY = 0, glowR = 0;

let t = 0;

let rotX = 0, rotY = 0, rotZ = 0;
let autoRotX = 0, autoRotY = 0, autoRotZ = 0;
let mouseRotX = 0, mouseRotY = 0;
let targetMouseRotX = 0, targetMouseRotY = 0;
let rotEaseIn = 0;

let loadingPhase = true;
let warmFrames = 0;
const WARM_TARGET = 60;

let glitchTimer = 0;
let glitchActive = false;
let glitchIntensity = 0;
let glitchSlices = [];

let wilt = 0;
let lastWilt = -1;
function easeInOutCubic(x) { return x < 0.5 ? 4*x*x*x : 1 - pow(-2*x+2, 3)/2; }
function easeOutQuart(x)   { return 1 - pow(1 - x, 4); }
function easeInQuad(x)     { return x * x; }

function setup() {
  createCanvas(windowWidth, windowHeight);
  pixelDensity(1);
  textFont('Courier New, monospace');
  textAlign(CENTER, CENTER);
  noStroke();

  buf = createGraphics(BUF_W, BUF_H);
  buf.pixelDensity(1);
  buf.noSmooth();

  ctx = drawingContext;

  elements = [
    { type:'peony', c1:[230,130,170], c2:[255,210,235], c3:[170,60,100],
      stemC:[55,85,40], layers:14, petalsPerLayer:9, maxRadius:155,
      ruffleAmt:12, sepals:5 },
    { type:'peony', c1:[240,170,190], c2:[255,230,240], c3:[190,90,130],
      stemC:[55,88,42], layers:15, petalsPerLayer:10, maxRadius:150,
      ruffleAmt:14, sepals:6 },
    { type:'peony', c1:[200,100,180], c2:[245,185,225], c3:[150,45,110],
      stemC:[50,80,38], layers:13, petalsPerLayer:9, maxRadius:158,
      ruffleAmt:13, sepals:5 },
  ];

  startElement(0);
}

function startElement(idx) {
  curEl = idx;
  bloom = 0;
  bloomTarget = 1;
  lastBloom = -1;
  lastWilt = -1;
  wilt = 0;
  phase = 'growing';
  phaseT = 0;
  grid = GRID_MIN;
  gridTarget = GRID_MIN;
  densDir = 1;
  densTimer = 0;
  modeT = 1;
}

function draw() {
  let dt = deltaTime / 1000;
  let f = elements[curEl];

  if (loadingPhase) {
    background(0);
    bloom = min(0.5, warmFrames / WARM_TARGET * 0.5);
    drawFlowerToBuffer(f, bloom, 0);
    warmFrames++;
    let pct = min(100, floor(warmFrames / WARM_TARGET * 100));
    let bar = document.getElementById('loader-bar');
    let txt = document.getElementById('loader-pct');
    if (bar) bar.style.width = pct + '%';
    if (txt) txt.textContent = pct + '%';
    if (warmFrames >= WARM_TARGET) {
      loadingPhase = false;
      bloom = 0;
      let el = document.getElementById('loader');
      if (el) { el.classList.add('fade'); setTimeout(() => el.remove(), 900); }
    }
    return;
  }

  background(0);
  t += 0.016;

  rotEaseIn = min(1, rotEaseIn + dt * 0.08);
  let re = easeInOutCubic(rotEaseIn);

  autoRotY += dt * 0.3 * re;
  autoRotX += dt * 0.12 * sin(t * 0.15) * re;
  autoRotZ += dt * 0.08 * sin(t * 0.09 + 1.5) * re;

  targetMouseRotX = (mouseY - height/2) / height * 1.2;
  targetMouseRotY = (mouseX - width/2) / width * 1.8;
  mouseRotX += (targetMouseRotX - mouseRotX) * 0.04;
  mouseRotY += (targetMouseRotY - mouseRotY) * 0.04;

  rotX = autoRotX + mouseRotX * re;
  rotY = autoRotY + mouseRotY * re;
  rotZ = autoRotZ;

  if (phase === 'growing') {
    bloom += (bloomTarget - bloom) * 0.006;
    phaseT += dt;
    if (bloom > 0.98) { bloom = 1; phase = 'interactive'; phaseT = 0; }
  }

  densTimer += dt;
  if (densTimer > 0.8) {
    densTimer = 0;
    triggerGlitch();
    prevMode = renderMode;
    renderMode = (renderMode + 1) % 3;
    modeT = 0;
    if (densDir === 1) { gridTarget = GRID_MAX; densDir = -1; }
    else { gridTarget = GRID_MIN; densDir = 1; }
  }

  if (phase === 'interactive') {
    phaseT += dt;
    if (phaseT > 25) { phase = 'wilting'; phaseT = 0; triggerGlitch(); }
  }

  if (phase === 'wilting') {
    wilt = min(1, wilt + dt * 0.04);
    phaseT += dt;
    if (wilt > 0.95) { phase = 'waiting'; phaseT = 0; }
  }

  if (phase === 'waiting') {
    phaseT += dt;
    if (phaseT > 0.6) {
      prevMode = renderMode;
      renderMode = (renderMode + 1) % 3;
      modeT = 0;
      triggerGlitch();
      startElement((curEl + 1) % elements.length);
    }
  }

  grid += (gridTarget - grid) * 0.08;
  modeT = min(1, modeT + dt * 4.0);

  updateGlitch(dt);

  if (phase === 'interactive') {
    mInfX += ((mouseX - width/2) * 0.08 - mInfX) * 0.04;
    mInfY += ((mouseY - height/2) * 0.08 - mInfY) * 0.04;
  } else {
    mInfX *= 0.95; mInfY *= 0.95;
  }

  drawFlowerToBuffer(f, bloom, wilt);

  glitchTimer -= dt;
  if (glitchTimer <= 0 && !glitchActive) {
    glitchTimer = random(3, 7);
    if (random() < 0.4) triggerGlitch();
  }

  renderToScreen();
  drawGlitchOverlay();
}

function triggerGlitch() {
  glitchActive = true;
  glitchIntensity = random(0.4, 1.0);
  glitchSlices = [];
  let scaleF = min(width / BUF_W, height / BUF_H) * 0.85;
  let rW = BUF_W * scaleF;
  let rH = BUF_H * scaleF;
  let fOx = (width - rW) / 2 + mInfX;
  let fOy = (height - rH) / 2 + mInfY;
  let numSlices = floor(random(3, 10));
  for (let i = 0; i < numSlices; i++) {
    let sy = random(fOy, fOy + rH);
    let sh = min(random(2, rH * 0.08), fOy + rH - sy);
    glitchSlices.push({
      y: sy, h: sh,
      fx: fOx, fw: rW,
      offset: random(-80, 80) * glitchIntensity,
      colorShift: random() < 0.4,
      duration: random(0.08, 0.3)
    });
  }
}

function updateGlitch(dt) {
  if (!glitchActive) return;
  let allDone = true;
  for (let s of glitchSlices) {
    s.duration -= dt;
    if (s.duration > 0) allDone = false;
    else s.offset *= 0.7;
  }
  if (allDone) {
    glitchActive = false;
    glitchSlices = [];
  }
}

function drawGlitchOverlay() {
  if (!glitchActive || glitchSlices.length === 0) return;

  let dc = drawingContext;
  for (let s of glitchSlices) {
    if (abs(s.offset) < 0.5) continue;

    let sx = floor(s.fx), sy = floor(s.y), sw = floor(s.fw), sh = floor(s.h);
    if (sw < 1 || sh < 1) continue;

    if (s.colorShift) {
      dc.save();
      dc.globalAlpha = 0.7;
      dc.globalCompositeOperation = 'lighter';
      dc.drawImage(dc.canvas, sx, sy, sw, sh, sx + s.offset * 1.5, sy, sw, sh);
      dc.globalAlpha = 0.45;
      dc.drawImage(dc.canvas, sx, sy, sw, sh, sx - s.offset, sy, sw, sh);
      dc.restore();
    } else {
      dc.drawImage(dc.canvas, sx, sy, sw, sh, sx + s.offset, sy, sw, sh);
    }
  }
}

function drawFlowerToBuffer(f, bl, wl) {
  let g = buf;
  g.background(0);
  g.noStroke();
  wl = wl || 0;

  let stemProgress = constrain(bl * 3, 0, 1);
  let flowerBloom = constrain((bl - 0.15) / 0.85, 0, 1);

  let wiltDroop = wl * 55;
  let flowerCX = BUF_W / 2;
  let flowerCY = BUF_H * 0.38 + wiltDroop;

  drawStem(g, f, stemProgress, wl, flowerCX, flowerCY);

  drawPeony3D(g, f, flowerBloom, wl, flowerCX, flowerCY);

  buf.loadPixels();
}

function drawStem(g, f, progress, wl, cx, cy) {
  wl = wl || 0;
  let stemLen = BUF_H * 0.42;
  let stemX = BUF_W / 2;
  let stemTop = cy;
  let stemBot = stemTop + stemLen;
  let visibleLen = stemLen * easeOutQuart(progress);
  let visibleTop = stemBot - visibleLen;

  for (let y = visibleTop; y < stemBot; y += 3) {
    let tt = (y - stemTop) / stemLen;
    let sw = lerp(15, 8, tt);
    let wiltBend = wl * 45 * (1 - tt) * sin((1 - tt) * PI);
    let curveX = sin(tt * PI * 0.3) * 22 + sin(tt * PI * 0.8) * 8 + wiltBend;

    let r = lerp(f.stemC[0], f.stemC[0]*0.5, tt);
    let gc = lerp(f.stemC[1], f.stemC[1]*0.5, tt);
    let b = lerp(f.stemC[2], f.stemC[2]*0.5, tt);
    if (wl > 0) { r = lerp(r, r*0.4+30, wl*0.5); gc = lerp(gc, gc*0.3+15, wl*0.5); b = lerp(b, b*0.25+8, wl*0.5); }
    g.fill(r, gc, b);
    g.ellipse(stemX + curveX, y, sw, 5);
    g.fill(r*1.4, gc*1.4, b*1.3, 50);
    g.ellipse(stemX + curveX - 2, y, sw*0.2, 3);
  }

  if (progress > 0.3) {
    let leafP = constrain((progress - 0.3) / 0.4, 0, 1);
    let ly = stemTop + stemLen * 0.22;
    let lx = stemX + sin(0.22 * PI * 0.3) * 22;
    drawLeaf(g, lx, ly, -1, 48 * leafP, f.stemC);
  }
  if (progress > 0.5) {
    let leafP = constrain((progress - 0.5) / 0.4, 0, 1);
    let ly = stemTop + stemLen * 0.50;
    let lx = stemX + sin(0.50 * PI * 0.3) * 22;
    drawLeaf(g, lx, ly, 1, 42 * leafP, f.stemC);
  }
  if (progress > 0.7) {
    let leafP = constrain((progress - 0.7) / 0.3, 0, 1);
    let ly = stemTop + stemLen * 0.35;
    let lx = stemX + sin(0.35 * PI * 0.3) * 22;
    drawLeaf(g, lx, ly, -1, 35 * leafP, f.stemC);
  }
}

function drawLeaf(g, x, y, side, sz, sc) {
  if (sz < 2) return;
  g.push();
  g.translate(x, y);
  g.rotate(side * 0.65);

  g.fill(sc[0]*0.85, sc[1]*1.15, sc[2]*0.75);
  g.beginShape();
  g.vertex(0, 0);
  g.bezierVertex(sz*0.35*side, -sz*0.38, sz*0.85*side, -sz*0.22, sz*1.35*side, 0);
  g.bezierVertex(sz*0.85*side, sz*0.22, sz*0.35*side, sz*0.38, 0, 0);
  g.endShape(CLOSE);

  g.fill(sc[0]*1.1, sc[1]*1.4, sc[2]*1.0, 60);
  g.beginShape();
  g.vertex(sz*0.1*side, 0);
  g.bezierVertex(sz*0.4*side, -sz*0.15, sz*0.7*side, -sz*0.08, sz*1.0*side, 0);
  g.bezierVertex(sz*0.7*side, sz*0.08, sz*0.4*side, sz*0.15, sz*0.1*side, 0);
  g.endShape(CLOSE);

  g.stroke(sc[0]*1.3, sc[1]*1.5, sc[2]*1.2, 70);
  g.strokeWeight(0.8);
  g.line(0, 0, sz*1.15*side, 0);
  for (let i = 1; i <= 3; i++) {
    let vx = sz * 0.3 * i * side;
    g.line(vx, 0, vx + sz*0.2*side, -sz*0.12);
    g.line(vx, 0, vx + sz*0.2*side, sz*0.12);
  }
  g.noStroke();
  g.pop();
}

function drawSepals(g, f, flowerBloom, wl) {
  let numS = f.sepals || 5;
  let openAngle = easeInOutCubic(flowerBloom) * HALF_PI * 0.9;
  let alpha = map(constrain(flowerBloom, 0, 0.7), 0, 0.7, 255, 0);
  if (wl) alpha *= (1 - wl);
  if (alpha < 5) return;

  g.push();
  g.translate(BUF_W / 2, BUF_H * 0.38);

  for (let i = 0; i < numS; i++) {
    let angle = (TWO_PI / numS) * i;
    g.push();
    g.rotate(angle);
    g.rotate(-openAngle);
    let sepalLen = 80;
    let sepalW = 25;
    g.fill(f.stemC[0]*0.7, f.stemC[1]*1.0, f.stemC[2]*0.6, alpha);
    g.beginShape();
    g.vertex(0, 0);
    g.bezierVertex(sepalLen*0.3, -sepalW*0.6, sepalLen*0.7, -sepalW*0.4, sepalLen, 0);
    g.bezierVertex(sepalLen*0.7, sepalW*0.4, sepalLen*0.3, sepalW*0.6, 0, 0);
    g.endShape(CLOSE);
    g.fill(f.stemC[0]*0.5, f.stemC[1]*0.8, f.stemC[2]*0.4, alpha*0.7);
    g.ellipse(sepalLen*0.9, 0, 12, 8);
    g.pop();
  }
  g.pop();
}

function drawDahlia(g, f, bl) {
  let easedBl = easeInOutCubic(bl);

  for (let layer = f.layers; layer >= 0; layer--) {
    let lr = layer / f.layers;
    let layerDelay = (1 - lr) * 0.45;
    let layerBl = constrain((bl - layerDelay) / (1 - layerDelay), 0, 1);
    let ebl = easeInOutCubic(layerBl);

    let np = floor(f.petalsBase - layer * 2.5);
    let maxLen = f.maxLen - layer * 4;
    let pw = f.petalW - layer * 0.5;

    for (let i = 0; i < np; i++) {
      let baseAngle = (TWO_PI / np) * i + layer * 0.17;

      let flatten = ebl;
      let petalTilt = lerp(HALF_PI * 0.85, 0, flatten);

      let len = maxLen * (0.2 + 0.8 * ebl) * (1 - lr * 0.45);
      let w = pw * (0.3 + 0.7 * ebl) * (1 - lr * 0.25);

      let curl = f.curlFactor * (1 - ebl) * (1 - lr * 0.5);

      let lightDir = sin(baseAngle * 0.5 + layer * 0.3);
      let depthDim = map(layer, 0, f.layers, 0.3, 1.0);
      let bloomBright = 0.5 + 0.5 * ebl;
      let cm = map(lightDir, -1, 1, 0.4, 1.2) * depthDim * bloomBright;

      let r = constrain(lerp(f.c1[0], f.c2[0], lr) * cm, 0, 255);
      let gr = constrain(lerp(f.c1[1], f.c2[1], lr) * cm, 0, 255);
      let b = constrain(lerp(f.c1[2], f.c2[2], lr) * cm, 0, 255);

      g.push();
      g.rotate(baseAngle);
      let tiltScale = cos(petalTilt);
      let tiltShift = sin(petalTilt) * len * 0.3;

      g.fill(r, gr, b);
      g.beginShape();
      for (let tt = 0; tt <= 1; tt += 0.08) {
        let px = tt * len * tiltScale + tiltShift * (1 - tt);
        let widthAtT = sin(tt * PI) * w;
        let curlY = sin(tt * PI * 1.5) * curl * 15 * tt;
        g.vertex(px, widthAtT + curlY);
      }
      for (let tt = 1; tt >= 0; tt -= 0.08) {
        let px = tt * len * tiltScale + tiltShift * (1 - tt);
        let widthAtT = sin(tt * PI) * w;
        let curlY = sin(tt * PI * 1.5) * curl * 15 * tt;
        g.vertex(px, -widthAtT + curlY);
      }
      g.endShape(CLOSE);
      g.pop();
    }
  }

  let centerAlpha = constrain((bl - 0.4) / 0.3, 0, 1);
  if (centerAlpha > 0) {
    for (let r = 38; r > 0; r -= 3) {
      let ratio = r / 38;
      g.fill(
        lerp(f.c3[0]*0.08, f.c3[0], ratio) * centerAlpha,
        lerp(f.c3[1]*0.08, f.c3[1], ratio) * centerAlpha,
        lerp(f.c3[2]*0.08, f.c3[2], ratio) * centerAlpha
      );
      g.ellipse(0, 0, r * 2, r * 2);
    }
    if (bl > 0.6) {
      let sa = constrain((bl - 0.6) / 0.3, 0, 1);
      for (let i = 0; i < 16; i++) {
        let a = (TWO_PI / 16) * i + 0.3;
        let d = 5 + i % 4 * 4;
        g.fill(f.c2[0]*0.6, f.c2[1]*0.6, f.c2[2]*0.3, 160 * sa);
        g.ellipse(cos(a)*d*sa, sin(a)*d*sa, 2.5, 2.5);
      }
    }
  }
}

function drawRose(g, f, bl) {
  for (let layer = f.layers; layer >= 0; layer--) {
    let lr = layer / f.layers;
    let layerDelay = (1 - lr) * 0.5;
    let layerBl = constrain((bl - layerDelay) / (1 - layerDelay), 0, 1);
    let ebl = easeInOutCubic(layerBl);

    let np = f.petalsPerLayer + floor(layer * 1.5);
    let baseR = lerp(12, f.maxRadius, lr);

    for (let i = 0; i < np; i++) {
      let angle = (TWO_PI / np) * i + layer * f.spiralTight;

      let spreadAngle = angle;
      let petalLength = baseR * (0.15 + 0.85 * ebl) * 1.3;
      let petalWidth = baseR * (0.1 + 0.9 * ebl) * 0.55;

      let curlBack = f.curlStrength * (1 - ebl) * (1 - lr * 0.3);

      let lightAngle = sin(angle + layer * 0.6);
      let depthMult = map(layer, 0, f.layers, 0.25, 1.0);
      let bloomBright = 0.45 + 0.55 * ebl;
      let cm = map(lightAngle, -1, 1, 0.45, 1.3) * depthMult * bloomBright;

      let r = constrain(lerp(f.c1[0], f.c2[0], lr) * cm, 0, 255);
      let gr = constrain(lerp(f.c1[1], f.c2[1], lr) * cm, 0, 255);
      let b = constrain(lerp(f.c1[2], f.c2[2], lr) * cm, 0, 255);

      g.push();
      g.rotate(spreadAngle);
      g.fill(r, gr, b);

      let pL = petalLength;
      let pW = petalWidth;
      let curlShift = curlBack * pW * 0.8;

      g.beginShape();
      g.vertex(0, 0);
      g.bezierVertex(pL*0.25, -(pW*1.1-curlShift), pL*0.75, -(pW*0.9-curlShift*0.5), pL*(0.7+0.3*ebl), -pW*0.1*ebl);
      g.bezierVertex(pL*(0.75+0.3*ebl), 0, pL*(0.75+0.3*ebl), 0, pL*(0.7+0.3*ebl), pW*0.1*ebl);
      g.bezierVertex(pL*0.75, (pW*0.9-curlShift*0.5), pL*0.25, (pW*1.1-curlShift), 0, 0);
      g.endShape(CLOSE);

      if (ebl > 0.4) {
        g.fill(min(255,r*1.4), min(255,gr*1.35), min(255,b*1.4), 50*ebl);
        g.beginShape();
        g.vertex(pL*0.15, 0);
        g.bezierVertex(pL*0.35, -pW*0.35*ebl, pL*0.6, -pW*0.25*ebl, pL*0.8*ebl, 0);
        g.bezierVertex(pL*0.6, pW*0.25*ebl, pL*0.35, pW*0.35*ebl, pL*0.15, 0);
        g.endShape(CLOSE);
      }

      g.pop();
    }
  }

  let cAlpha = constrain((bl - 0.5) / 0.3, 0, 1);
  if (cAlpha > 0) {
    for (let r = 24; r > 0; r -= 2) {
      let ratio = r / 24;
      g.fill(
        lerp(f.c3[0]*0.06, f.c3[0]*0.5, ratio) * cAlpha,
        lerp(f.c3[1]*0.06, f.c3[1]*0.5, ratio) * cAlpha,
        lerp(f.c3[2]*0.06, f.c3[2]*0.5, ratio) * cAlpha
      );
      g.ellipse(sin(r*0.5)*4*cAlpha, cos(r*0.5)*4*cAlpha, r*2.8, r*2.8);
    }
  }
}

function rot3D(x, y, z) {
  let cY = cos(rotY), sY = sin(rotY);
  let rx = x * cY + z * sY;
  let rz = -x * sY + z * cY;
  let cX = cos(rotX), sX = sin(rotX);
  let ry = y * cX - rz * sX;
  let rz2 = y * sX + rz * cX;
  let cZ = cos(rotZ), sZ = sin(rotZ);
  let fx = rx * cZ - ry * sZ;
  let fy = rx * sZ + ry * cZ;
  return [fx, fy, rz2];
}

function drawPeony3D(g, f, bl, wl, cx, cy) {
  wl = wl || 0;
  let focal = 420;
  let wiltTilt = wl * 0.18;
  let cosW = cos(wiltTilt);
  let sinW = sin(wiltTilt);

  let items = [];

  if (f.sepals && bl < 0.7) {
    let numS = f.sepals;
    let openAng = easeInOutCubic(bl) * HALF_PI * 0.9;
    let sepalAlpha = map(constrain(bl, 0, 0.7), 0, 0.7, 255, 0);
    if (wl) sepalAlpha *= (1 - wl);
    if (sepalAlpha > 5) {
      for (let i = 0; i < numS; i++) {
        let a = (TWO_PI / numS) * i;
        let sTilt = HALF_PI * 0.35 - openAng;
        let dist = 50;
        let ct = cos(sTilt), st = sin(sTilt);
        let x3 = cos(a) * dist * ct;
        let z3 = sin(a) * dist * ct;
        let y3 = -st * dist;
        let [rx, ry, rz] = rot3D(x3, y3, z3);
        let ps = focal / (focal + rz);
        let sepAng = atan2(ry, rx);
        let fv = max(focal / (focal + abs(rz)), 0.15);
        items.push({
          rz, tp: 's',
          sx: rx * ps, sy: ry * ps,
          sa: sepAng,
          sLen: 80 * ps, sW: 25 * ps * fv,
          sAlpha: sepalAlpha,
          sc: f.stemC
        });
      }
    }
  }

  let cAlpha = constrain((bl - 0.45) / 0.3, 0, 1) * (1 - wl);
  if (cAlpha > 0) {
    items.push({ rz: 0, tp: 'c', alpha: cAlpha });
  }

  for (let layer = f.layers; layer >= 0; layer--) {
    let lr = layer / f.layers;
    let layerDelay = (1 - lr) * 0.35;
    let layerBl = constrain((bl - layerDelay) / (1 - layerDelay), 0, 1);
    let ebl = easeInOutCubic(layerBl);
    if (ebl < 0.01) continue;

    let layerFall = constrain((wl * 1.4 - (1 - lr) * 0.4) / 0.6, 0, 1);
    if (layerFall > 0.9) continue;

    let innerBoost = (1 - lr);
    let np = f.petalsPerLayer + floor(layer * 1.5) + floor(innerBoost * 5);
    let baseR = lerp(10, f.maxRadius, lr);

    let tiltAngle = lerp(PI * 0.42, PI * 0.04, ebl) + layerFall * PI * 0.22;
    tiltAngle -= innerBoost * 0.15 * ebl;

    let cosTilt = cos(tiltAngle);
    let sinTilt = sin(tiltAngle);

    for (let i = 0; i < np; i++) {
      let petalHash = ((i * 73 + layer * 137) & 0xFF) / 255;
      if (wl > 0.1 && petalHash < (wl - 0.1) * 1.3) continue;

      let angle = (TWO_PI / np) * i + layer * 0.42 + sin(layer * 2.1) * 0.12;
      angle += petalHash * 0.15;
      let droopAmt = layerFall * 0.5 * (0.4 + lr * 0.6);
      let shrink = 1 - layerFall * 0.35;

      let dist = baseR * ebl * (0.35 + lr * 0.25);
      let x3 = cos(angle) * dist * cosTilt;
      let z3 = sin(angle) * dist * cosTilt;
      let y3 = -sinTilt * dist + droopAmt * 28;

      if (wiltTilt > 0.001) {
        let ny = y3 * cosW - x3 * sinW * 0.3;
        x3 = x3 + y3 * sinW * 0.3;
        y3 = ny;
      }

      let [rx, ry, rz] = rot3D(x3, y3, z3);
      let ps = focal / (focal + rz);
      let sx = rx * ps;
      let sy = ry * ps;

      let viewAngle = atan2(ry, rx);
      let depthFactor = focal / (focal + abs(rz));
      let faceVis = max(depthFactor, 0.12);

      let nx3 = cos(angle) * cosTilt;
      let ny3 = -sinTilt;
      let nz3 = sin(angle) * cosTilt;
      let [lnx, lny, lnz] = rot3D(nx3, ny3, nz3);
      let lightDot = constrain(-lnz, -1, 1);
      let lightMod = map(lightDot, -1, 1, 0.32, 1.25);

      let cupFactor = (1 - lr) * (1 - ebl * 0.5) * 0.35;
      let pl = baseR * (0.2 + 0.8 * ebl) * (1.15 + innerBoost * 0.3) * shrink * ps;
      let pw = baseR * (0.15 + 0.85 * ebl) * 0.55 * shrink * ps * faceVis;
      pw *= (1 + cupFactor);
      let rPhase = i * 1.7 + layer * 0.9;
      let rAmt = f.ruffleAmt * ebl * (1 + layerFall * 2 + innerBoost * 0.5) * ps;

      let lA = sin(angle + layer * 0.5);
      let dM = map(layer, 0, f.layers, 0.35, 1.0);
      let bB = 0.4 + 0.6 * ebl;
      let cm = map(lA, -1, 1, 0.45, 1.2) * dM * bB * lightMod;

      let r = constrain(lerp(f.c1[0], f.c2[0], lr) * cm, 0, 255);
      let gr = constrain(lerp(f.c1[1], f.c2[1], lr) * cm, 0, 255);
      let b = constrain(lerp(f.c1[2], f.c2[2], lr) * cm, 0, 255);

      if (wl > 0) {
        let wf = min(1, layerFall * 1.3);
        r = lerp(r, r * 0.5 + 55, wf);
        gr = lerp(gr, gr * 0.28 + 22, wf);
        b = lerp(b, b * 0.12 + 6, wf);
      }

      items.push({
        rz, tp: 'p',
        sx, sy, sa: viewAngle, pl, pw, rPhase, rAmt,
        r, gr, b, cup: cupFactor
      });
    }
  }

  items.sort((a, b) => a.rz - b.rz);

  for (let it of items) {
    if (it.tp === 'c') {
      g.push();
      g.translate(cx, cy);
      let [cnx, cny, cnz] = rot3D(0, -1, 0);
      let cps = focal / (focal + cnz * 15);
      let csx = cnx * 15 * cps;
      let csy = cny * 15 * cps;
      for (let r = 28; r > 0; r -= 3) {
        let ratio = r / 28;
        g.fill(
          lerp(f.c3[0]*0.1, f.c3[0]*0.7, ratio)*it.alpha,
          lerp(f.c3[1]*0.1, f.c3[1]*0.7, ratio)*it.alpha,
          lerp(f.c3[2]*0.1, f.c3[2]*0.7, ratio)*it.alpha
        );
        g.ellipse(csx, csy, r*2.2*cps, r*2.2*cps);
      }
      if (bl > 0.65) {
        let sa2 = constrain((bl-0.65)/0.25, 0, 1) * (1 - wl);
        for (let i = 0; i < 22; i++) {
          let a = (TWO_PI / 22) * i;
          let d = 6 + (i%5) * 3;
          let stX = cos(a) * d * sa2;
          let stZ = sin(a) * d * sa2;
          let stY = -3;
          let [srx, sry, srz] = rot3D(stX, stY, stZ);
          let stP = focal / (focal + srz);
          g.fill(f.c2[0]*0.7, f.c2[1]*0.5, f.c2[2]*0.3, 140*sa2);
          g.ellipse(srx * stP, sry * stP, 2.5*stP, 2.5*stP);
        }
      }
      g.pop();
    } else if (it.tp === 's') {
      if (it.sW < 1) continue;
      g.push();
      g.translate(cx + it.sx, cy + it.sy);
      g.rotate(it.sa);
      g.fill(it.sc[0]*0.7, it.sc[1]*1.0, it.sc[2]*0.6, it.sAlpha);
      g.beginShape();
      g.vertex(0, 0);
      g.bezierVertex(it.sLen*0.3, -it.sW*0.6, it.sLen*0.7, -it.sW*0.4, it.sLen, 0);
      g.bezierVertex(it.sLen*0.7, it.sW*0.4, it.sLen*0.3, it.sW*0.6, 0, 0);
      g.endShape(CLOSE);
      g.pop();
    } else {
      if (it.pw < 0.5) continue;
      g.push();
      g.translate(cx + it.sx, cy + it.sy);
      g.rotate(it.sa);
      g.fill(it.r, it.gr, it.b);
      g.beginShape();
      for (let tt = 0; tt <= 1; tt += 0.07) {
        let px = tt * it.pl;
        let bW = sin(tt * PI) * it.pw;
        let cup = sin(tt * PI) * it.cup * it.pw * 0.6;
        let ruf = sin(tt * 8 + it.rPhase) * it.rAmt * tt;
        g.vertex(px, bW + ruf + cup);
      }
      for (let tt = 1; tt >= 0; tt -= 0.07) {
        let px = tt * it.pl;
        let bW = sin(tt * PI) * it.pw;
        let cup = sin(tt * PI) * it.cup * it.pw * 0.4;
        let ruf = sin(tt * 8 + it.rPhase + PI) * it.rAmt * tt;
        g.vertex(px, -bW + ruf - cup);
      }
      g.endShape(CLOSE);
      g.pop();
    }
  }
}

function renderToScreen() {
  let px = buf.pixels;
  let g = max(4, round(grid));
  let asciiG = max(g, 6);

  let scaleF = min(width / BUF_W, height / BUF_H) * 0.85;
  let invScale = 1 / scaleF;
  let renderW = BUF_W * scaleF;
  let renderH = BUF_H * scaleF;
  let ox = (width - renderW) / 2 + mInfX;
  let oy = (height - renderH) / 2 + mInfY;

  let curMode = renderMode;
  let prevM = prevMode;
  let mt = modeT;
  let transitionDone = mt >= 0.99;

  let useNative = (curMode === 0) || (!transitionDone && prevM === 0);
  if (useNative) {
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
  }

  let gEff = (curMode === 0 && transitionDone) ? asciiG : g;
  let halfG = gEff * 0.5;

  let yStart = max(0, floor(oy / gEff) * gEff);
  let yEnd = min(height, oy + renderH);
  let xStart = max(0, floor(ox / gEff) * gEff);
  let xEnd = min(width, ox + renderW);

  let asciiSize = gEff * 1.1;
  let lastFontStr = '';

  for (let sy = yStart; sy < yEnd; sy += gEff) {
    let byBase = floor((sy - oy) * invScale);
    if (byBase < 0 || byBase >= BUF_H) continue;
    let rowOff = byBase * BUF_W;

    for (let sx = xStart; sx < xEnd; sx += gEff) {
      let bx = floor((sx - ox) * invScale);
      if (bx < 0 || bx >= BUF_W) continue;

      let idx = (rowOff + bx) * 4;
      let r = px[idx], g2 = px[idx+1], b = px[idx+2];
      if ((r + g2 + b) < 12) continue;
      let bright = r * 0.299 + g2 * 0.587 + b * 0.114;

      let cx = sx + halfG;
      let cy = sy + halfG;

      let mode;
      if (transitionDone) {
        mode = curMode;
      } else {
        let hash = ((sx * 73 + sy * 137) & 0xFF) * 0.00392;
        mode = hash < mt ? curMode : prevM;
      }

      if (mode === 0) {
        let fontSz = floor(asciiSize * (0.4 + bright * 0.004));
        let fontStr = fontSz + 'px Courier New';
        if (fontStr !== lastFontStr) { ctx.font = fontStr; lastFontStr = fontStr; }
        ctx.fillStyle = 'rgb(' + r + ',' + g2 + ',' + b + ')';
        let ci = ((bright >> 2) + ((sx * 7 + sy * 13) >> 3)) % chars.length;
        ctx.fillText(chars[ci], cx, cy);
      } else if (mode === 1) {
        fill(r, g2, b);
        let d = gEff * (0.1 + bright * 0.0033);
        ellipse(cx, cy, d, d);
      } else {
        fill(r, g2, b);
        rectMode(CENTER);
        rect(cx, cy, gEff * 0.93, gEff * 0.93);
      }
    }
  }
}

function drawCursorGlow(f) {
  if (phase !== 'interactive') return;
  glowR = lerp(glowR, 35, 0.08);

  let cr = f.c1[0], cg = f.c1[1], cb = f.c1[2];
  for (let r = glowR; r > 0; r -= 5) {
    fill(cr, cg, cb, map(r, 0, glowR, 55, 3));
    ellipse(mouseX, mouseY, r * 2, r * 2);
  }
  fill(255, 255, 255, 200);
  ellipse(mouseX, mouseY, 4, 4);
}

function drawUI(f) {
  let modeNames = ['ASCII', 'DOTS', 'PIXEL'];
  let typeNames = { rose:'?? Rosa', dahlia:'?? Dalia', peony:'?? Peon?a' };
  let elName = typeNames[f.type] || f.type;

  fill(0, 0, 0, 140);
  noStroke();
  rectMode(CORNER);
  rect(0, height - 48, width, 48);

  fill(255, 255, 255, 200);
  textSize(13);
  textAlign(LEFT, CENTER);
  text(elName, 18, height - 28);

  let bpX = 110, bpW = 80;
  fill(255,255,255,30);
  rect(bpX, height-32, bpW, 5, 3);
  fill(f.c1[0], f.c1[1], f.c1[2], 180);
  rect(bpX, height-32, bpW * bloom, 5, 3);
  fill(255,255,255,60);
  textSize(8);
  textAlign(LEFT, CENTER);
  text('bloom', bpX, height-22);

  textAlign(CENTER, CENTER);
  for (let i = 0; i < 3; i++) {
    let x = width/2 - 60 + i * 60;
    let active = i === renderMode;
    fill(255, 255, 255, active ? 220 : 50);
    textSize(active ? 13 : 10);
    text(modeNames[i], x, height - 28);
    if (active) { fill(255,255,255,200); rect(x-18, height-19, 36, 2); }
  }

  let barX = width - 130, barW = 90;
  fill(255,255,255,30);
  rectMode(CORNER);
  rect(barX, height-32, barW, 5, 3);
  fill(255,255,255,130);
  rect(barX, height-32, map(grid, GRID_MIN, GRID_MAX, barW, 0), 5, 3);
  fill(255,255,255,60);
  textSize(8);
  textAlign(RIGHT, CENTER);
  text('densidad', width-18, height-22);

  textAlign(CENTER, CENTER);
  let dotsY = height - 10;
  for (let i = 0; i < elements.length; i++) {
    let dotX = width/2 - (elements.length * 12)/2 + i * 14;
    fill(255, 255, 255, i === curEl ? 220 : 45);
    ellipse(dotX, dotsY, i === curEl ? 6 : 4, i === curEl ? 6 : 4);
  }

  fill(255,255,255,40);
  textSize(9);
  textAlign(LEFT, TOP);
  text(floor(frameRate()) + ' fps', 10, 10);
  textAlign(CENTER, CENTER);

  if (phase === 'growing') {
    fill(255,255,255,80);
    textSize(10);
    text('floreciendo...', width/2, 18);
  } else if (phase === 'wilting') {
    fill(255,255,255,60);
    textSize(10);
    text('marchit?ndose...', width/2, 18);
  }
}

function mousePressed() {
  if (loadingPhase) return;
  triggerGlitch();
}

function keyPressed() {
  if (key === 'f' || key === 'F') fullscreen(!fullscreen());
  if (key === 'g' || key === 'G') triggerGlitch();
}

function windowResized() { resizeCanvas(windowWidth, windowHeight); }
</script>
